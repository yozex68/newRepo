name: Deploy PHP Application to AWS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Update system packages
            sudo apt-get update -y
            
            # 2. Install Apache, PHP, and MySQL extension silently if not installed
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y apache2 php libapache2-mod-php php-mysql git mysql-server
            
            # 3. Enable Apache rewrite engine for your .htaccess file
            sudo a2enmod rewrite
            
            # 4. Navigate to web directory, clone or pull the code
            cd /var/www
            if [ -d "html/.git" ]; then
              cd html
              sudo git fetch --all
              sudo git reset --hard origin/master
            else
              sudo rm -rf html
              sudo git clone https://${{ secrets.GH_PAT }}@://github.com{{ github.repository }}.git html
            fi
            
            # 5. Fix permissions so Apache can read your files
            sudo chown -R www-data:www-data /var/www/html
            sudo chmod -R 755 /var/www/html
            
            # 6. Restart Apache to apply changes

            # Update Apache config to point directly to the public folder
            sudo sed -i 's|DocumentRoot /var/www/html|DocumentRoot /var/www/html/public|g' /etc/apache2/sites-available/000-default.conf
            sudo sed -i 's|<Directory /var/www/>|<Directory /var/www/html/public/>|g' /etc/apache2/sites-available/000-default.conf
            
            # Allow .htaccess files to handle routing links
            sudo sed -i '/<Directory \/var\/www\/html\/public\/>/,/<\/Directory>/ s/AllowOverride None/AllowOverride All/' /etc/apache2/sites-available/000-default.conf
            sudo systemctl restart apache2